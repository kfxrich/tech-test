<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Task manager styled with Tailwind CSS - utility-first styling">
    <title>Task Manager - Test 6: Tailwind CSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                            950: '#172554',
                        },
                        danger: {
                            50: '#fef2f2',
                            100: '#fee2e2',
                            200: '#fecaca',
                            300: '#fca5a5',
                            400: '#f87171',
                            500: '#ef4444',
                            600: '#dc2626',
                            700: '#b91c1c',
                            800: '#991b1b',
                            900: '#7f1d1d',
                            950: '#450a0a',
                        },
                        success: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            200: '#a7f3d0',
                            300: '#6ee7b7',
                            400: '#34d399',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                            800: '#065f46',
                            900: '#064e3b',
                            950: '#022c22',
                        }
                    },
                    fontFamily: {
                        sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex items-start justify-center p-4 font-sans text-gray-900">
    <div class="w-full max-w-lg bg-white rounded-xl shadow-lg overflow-hidden">
        <!-- Header -->
        <header class="p-8 pb-6 border-b border-gray-200 bg-gradient-to-r from-indigo-500 to-purple-600 text-white">
            <h1 class="text-2xl font-bold mb-2">📋 Task Manager</h1>
            <p class="text-white/90 text-sm">Test 6: Tailwind CSS - Utility-first styling</p>
        </header>

        <!-- Form Section -->
        <section aria-label="Add new task" class="p-6 pb-6 border-b border-gray-200">
            <form id="taskForm" class="mb-2">
                <div class="flex gap-3">
                    <input
                        type="text"
                        id="taskInput"
                        name="task"
                        placeholder="What needs to be done? (Press Enter to add)"
                        required
                        autocomplete="off"
                        aria-label="New task description"
                        class="flex-1 px-4 py-3 border-2 border-gray-200 rounded-lg text-base text-gray-900 bg-gray-50 transition-all duration-150 focus:outline-none focus:border-primary-500 focus:ring-4 focus:ring-primary-500/20 placeholder:text-gray-400"
                    >
                    <button
                        type="submit"
                        class="px-6 py-3 bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-lg transition-all duration-150 focus:outline-none focus:ring-4 focus:ring-primary-500/20 active:scale-95 whitespace-nowrap"
                    >
                        Add Task
                    </button>
                </div>
            </form>
            <div class="flex gap-4 text-xs text-gray-500">
                <span class="bg-gray-50 px-2 py-1 rounded border border-gray-200 font-mono">Esc</span>
                <span>Clear input</span>
                <span class="bg-gray-50 px-2 py-1 rounded border border-gray-200 font-mono">Enter</span>
                <span>Add task</span>
            </div>
        </section>

        <!-- Task List Section -->
        <section aria-label="Task list" class="p-4 pb-6 max-h-[500px] overflow-y-auto">
            <!-- Filter Controls -->
            <div class="flex gap-2 mb-4 flex-wrap">
                <button
                    class="filter-btn px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-medium rounded-lg border border-gray-200 transition-all duration-150 focus:outline-none focus:ring-4 focus:ring-primary-500/20 active:scale-95 data-active:bg-primary-600 data-active:text-white data-active:border-primary-600"
                    data-filter="all"
                >
                    All
                </button>
                <button
                    class="filter-btn px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-medium rounded-lg border border-gray-200 transition-all duration-150 focus:outline-none focus:ring-4 focus:ring-primary-500/20 active:scale-95 data-active:bg-primary-600 data-active:text-white data-active:border-primary-600"
                    data-filter="active"
                >
                    Active
                </button>
                <button
                    class="filter-btn px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-medium rounded-lg border border-gray-200 transition-all duration-150 focus:outline-none focus:ring-4 focus:ring-primary-500/20 active:scale-95 data-active:bg-primary-600 data-active:text-white data-active:border-primary-600"
                    data-filter="completed"
                >
                    Completed
                </button>
            </div>

            <!-- Task List -->
            <ul id="taskList" class="space-y-2"></ul>

            <!-- Stats -->
            <div id="taskStats" class="flex gap-4 mt-4 pt-4 border-t border-gray-200 text-xs text-gray-500"></div>
        </section>

        <!-- Footer -->
        <footer class="p-4 border-t border-gray-200 bg-gray-50 text-center">
            <p class="text-sm text-gray-600">Next: Next.js → Node.js → Prisma</p>
        </footer>
    </div>

    <script>
        // ============================================
        // Task Manager - Test 6: Tailwind CSS
        // Utility-first styling with vanilla JavaScript
        // ============================================

        const STORAGE_KEY = 'task-manager-tasks-tailwind';
        const Priority = {
            Low: 'low',
            Normal: 'normal',
            High: 'high'
        };

        const PriorityColors = {
            low: 'bg-success-500',
            normal: 'bg-primary-500',
            high: 'bg-danger-500'
        };

        const PriorityBgColors = {
            low: '#10b981',
            normal: '#3b82f6',
            high: '#ef4444'
        };

        // State
        let tasks = [];
        let currentFilter = 'all';

        // DOM Elements
        const taskForm = document.getElementById('taskForm');
        const taskInput = document.getElementById('taskInput');
        const taskList = document.getElementById('taskList');
        const taskStats = document.getElementById('taskStats');
        const filterButtons = document.querySelectorAll('.filter-btn');

        // Functions
        function saveTasks() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
            } catch (error) {
                console.error('Failed to save tasks:', error);
            }
        }

        function loadTasks() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    tasks = JSON.parse(stored);
                }
            } catch (error) {
                console.error('Failed to load tasks:', error);
                tasks = [];
            }
        }

        function addTask(text) {
            const task = {
                id: Date.now(),
                text: text.trim(),
                completed: false,
                createdAt: new Date().toISOString(),
                priority: Priority.Normal
            };
            tasks.unshift(task);
            saveTasks();
            render();
        }

        function deleteTask(id) {
            tasks = tasks.filter(task => task.id !== id);
            saveTasks();
            render();
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                task.updatedAt = new Date().toISOString();
                saveTasks();
                render();
            }
        }

        function editTask(id, newText) {
            const task = tasks.find(t => t.id === id);
            if (task && newText.trim()) {
                task.text = newText.trim();
                task.updatedAt = new Date().toISOString();
                saveTasks();
                render();
            }
        }

        function setPriority(id, priority) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.priority = priority;
                task.updatedAt = new Date().toISOString();
                saveTasks();
                render();
            }
        }

        function getFilteredTasks() {
            switch (currentFilter) {
                case 'active':
                    return tasks.filter(t => !t.completed);
                case 'completed':
                    return tasks.filter(t => t.completed);
                default:
                    return tasks;
            }
        }

        function setFilter(filter) {
            currentFilter = filter;
            render();
        }

        function render() {
            const filteredTasks = getFilteredTasks();

            // Render task list
            if (filteredTasks.length === 0) {
                const emptyMessages = {
                    all: 'No tasks yet. Add one above!',
                    active: 'No active tasks. Great job!',
                    completed: 'No completed tasks yet.'
                };
                taskList.innerHTML = `
                    <li class="text-center py-12 italic text-gray-400 bg-transparent border-2 border-dashed border-gray-200 rounded-lg">
                        ${emptyMessages[currentFilter]}
                    </li>
                `;
            } else {
                taskList.innerHTML = filteredTasks.map(task => {
                    const priorityClass = PriorityColors[task.priority];
                    const priorityBgColor = PriorityBgColors[task.priority];

                    return `
                        <li
                            class="${task.completed ? 'opacity-50 line-through' : ''} p-4 mb-2 bg-gray-50 rounded-lg flex justify-between items-center gap-4 border border-transparent hover:border-gray-200 hover:bg-gray-100 transition-all duration-250 focus:outline-none focus:ring-4 focus:ring-primary-500/20"
                            data-id="${task.id}"
                            tabindex="0"
                        >
                            <div class="flex items-center gap-3 flex-1">
                                <div
                                    class="w-3 h-3 rounded-full flex-shrink-0"
                                    style="background-color: ${priorityBgColor}"
                                ></div>
                                <input
                                    type="checkbox"
                                    class="w-5 h-5 cursor-pointer accent-primary-600"
                                    ${task.completed ? 'checked' : ''}
                                    onchange="toggleTask(${task.id})"
                                    aria-label="Mark ${escapeHtml(task.text)} as ${task.completed ? 'incomplete' : 'complete'}"
                                >
                                <span
                                    class="task-item-text text-sm flex-1 ${task.completed ? 'line-through text-gray-400' : 'text-gray-900'} cursor-pointer hover:opacity-80"
                                    ondblclick="enableEdit(${task.id})"
                                >
                                    ${escapeHtml(task.text)}
                                </span>
                            </div>
                            <div class="flex gap-2 items-center">
                                <select
                                    class="px-2 py-1 text-xs border border-gray-200 rounded bg-gray-50 cursor-pointer text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary-500/50"
                                    onchange="changePriority(${task.id}, this.value)"
                                >
                                    <option value="low" ${task.priority === Priority.Low ? 'selected' : ''}>Low</option>
                                    <option value="normal" ${task.priority === Priority.Normal ? 'selected' : ''}>Normal</option>
                                    <option value="high" ${task.priority === Priority.High ? 'selected' : ''}>High</option>
                                </select>
                                <button
                                    class="px-2 py-1 bg-transparent border border-gray-200 rounded transition-all duration-150 hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-primary-500/50"
                                    onclick="enableEdit(${task.id})"
                                    title="Edit"
                                >
                                    ✏️
                                </button>
                                <button
                                    class="px-2 py-1 bg-danger-500 hover:bg-danger-600 text-white rounded transition-all duration-150 focus:outline-none focus:ring-4 focus:ring-danger-500/20 active:scale-95"
                                    onclick="deleteTask(${task.id})"
                                    title="Delete"
                                >
                                    🗑️
                                </button>
                            </div>
                        </li>
                    `;
                }).join('');
            }

            // Update filter buttons
            filterButtons.forEach(btn => {
                const isActive = btn.dataset.filter === currentFilter;
                if (isActive) {
                    btn.classList.add('bg-primary-600', 'text-white', 'border-primary-600');
                    btn.classList.remove('bg-gray-100', 'text-gray-600', 'border-gray-200');
                } else {
                    btn.classList.remove('bg-primary-600', 'text-white', 'border-primary-600');
                    btn.classList.add('bg-gray-100', 'text-gray-600', 'border-gray-200');
                }
            });

            // Update stats
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const active = total - completed;
            const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;

            taskStats.innerHTML = `
                <span class="flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-primary-500"></span>
                    <span>${active} active</span>
                </span>
                <span class="flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-success-500"></span>
                    <span>${completed} completed</span>
                </span>
                <span class="flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-gray-400"></span>
                    <span>${percentage}% done</span>
                </span>
            `;
        }

        function enableEdit(id) {
            const li = document.querySelector(`li[data-id="${id}"]`);
            const textSpan = li.querySelector('.task-item-text');
            const task = tasks.find(t => t.id === id);

            if (!textSpan || !task) return;

            textSpan.contentEditable = true;
            textSpan.focus();
            textSpan.classList.add('editing');

            const range = document.createRange();
            range.selectNodeContents(textSpan);
            const selection = window.getSelection();
            selection?.removeAllRanges();
            selection?.addRange(range);

            textSpan.onkeydown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    finishEdit(id, textSpan, task);
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    cancelEdit(textSpan, task);
                }
            };

            textSpan.onblur = () => {
                finishEdit(id, textSpan, task);
            };
        }

        function finishEdit(id, textSpan, task) {
            textSpan.contentEditable = false;
            textSpan.classList.remove('editing');

            if (textSpan.textContent !== task.text) {
                editTask(id, textSpan.textContent || '');
            }
        }

        function cancelEdit(textSpan, task) {
            textSpan.contentEditable = false;
            textSpan.classList.remove('editing');
            textSpan.textContent = task.text;
        }

        function changePriority(id, value) {
            setPriority(id, value);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'fixed bottom-5 right-5 bg-gray-900 text-white px-6 py-4 rounded-lg shadow-lg z-50 animate-in';
            notification.textContent = message;

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.classList.add('animate-out');
                setTimeout(() => notification.remove(), 300);
            }, 2000);
        }

        // Event Listeners
        taskForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = taskInput.value.trim();
            if (text) {
                addTask(text);
                taskInput.value = '';
                showNotification('Task added!');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.activeElement === taskInput) {
                taskInput.value = '';
                showNotification('Input cleared');
            }
        });

        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const filter = btn.dataset.filter;
                if (filter) {
                    setFilter(filter);
                }
            });
        });

        taskList.addEventListener('keydown', (e) => {
            const li = e.target.closest('li[data-id]');
            if (!li) return;

            const id = parseInt(li.dataset.id || '0');

            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                const checkbox = li.querySelector('input[type="checkbox"]');
                if (checkbox) checkbox.click();
            } else if (e.key === 'e' || e.key === 'E') {
                enableEdit(id);
            } else if (e.key === 'd' || e.key === 'D') {
                deleteTask(id);
            }
        });

        // Initialization
        loadTasks();
        render();
    </script>

    <style>
        .task-item-text.editing {
            outline: 2px solid #3b82f6;
            background: white;
            padding: 0.25rem 0.5rem;
            border-radius: 0.5rem;
        }

        .task-item-text:focus {
            outline: none;
        }

        @keyframes animate-in {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes animate-out {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        .animate-in {
            animation: animate-in 0.3s ease-out;
        }

        .animate-out {
            animation: animate-out 0.3s ease-out;
        }

        /* Dark mode support (optional) */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #111827;
                color: #f9fafb;
            }

            .bg-gray-50 {
                background-color: #1f2937;
            }

            .bg-gray-100 {
                background-color: #111827;
            }

            .bg-white {
                background-color: #1f2937;
            }

            .text-gray-900 {
                color: #f9fafb;
            }

            .text-gray-600 {
                color: #d1d5db;
            }

            .border-gray-200 {
                border-color: #374151;
            }
        }
    </style>
</body>
</html>
