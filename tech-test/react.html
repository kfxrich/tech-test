<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A React-based task manager demonstrating hooks, components, and virtual DOM">
    <title>Task Manager - Test 5: React</title>
    <link rel="stylesheet" href="styles.css">
    <!-- React 18 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root">
        <div style="padding: 2rem; text-align: center;">Loading React app...</div>
    </div>

    <script type="text/babel" data-presets="react">
        // ============================================
        // Task Manager - Test 5: React
        // Component-based architecture with hooks
        // ============================================

        const { useState, useEffect, useMemo, useCallback, useRef } = React;
        const { createRoot } = ReactDOM;

        // ============================================
        // Constants & Types
        // ============================================

        const STORAGE_KEY = 'task-manager-tasks-react';
        const Priority = {
            Low: 'low',
            Normal: 'normal',
            High: 'high'
        };

        const PriorityColors = {
            [Priority.Low]: '#10b981',
            [Priority.Normal]: '#3b82f6',
            [Priority.High]: '#ef4444'
        };

        // ============================================
        // Custom Hook: useLocalStorage
        // ============================================

        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.error(`Error loading ${key}:`, error);
                    return initialValue;
                }
            });

            const setValue = useCallback((value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error(`Error saving ${key}:`, error);
                }
            }, [key, storedValue]);

            return [storedValue, setValue];
        }

        // ============================================
        // Component: Header
        // ============================================

        function Header() {
            return React.createElement('header', null,
                React.createElement('h1', null, '📋 Task Manager'),
                React.createElement('p', null, 'Test 5: React - Component-based architecture')
            );
        }

        // ============================================
        // Component: TaskForm
        // ============================================

        function TaskForm({ onAdd }) {
            const [input, setInput] = useState('');
            const inputRef = useRef(null);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (input.trim()) {
                    onAdd(input);
                    setInput('');
                    if (inputRef.current) {
                        inputRef.current.focus();
                    }
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Escape') {
                    setInput('');
                }
            };

            return React.createElement('section', { 'aria-label': 'Add new task' },
                React.createElement('form', { onSubmit: handleSubmit },
                    React.createElement('div', { className: 'input-group' },
                        React.createElement('input', {
                            ref: inputRef,
                            type: 'text',
                            value: input,
                            onChange: (e) => setInput(e.target.value),
                            onKeyDown: handleKeyDown,
                            placeholder: 'What needs to be done? (Press Enter to add)',
                            required: true,
                            autoComplete: 'off',
                            'aria-label': 'New task description'
                        }),
                        React.createElement('button', { type: 'submit' }, 'Add Task')
                    )
                ),
                React.createElement('div', { className: 'shortcuts' },
                    React.createElement('span', { className: 'shortcut' }, 'Esc'),
                    ' Clear input ',
                    React.createElement('span', { className: 'shortcut' }, 'Enter'),
                    ' Add task'
                )
            );
        }

        // ============================================
        // Component: FilterControls
        // ============================================

        function FilterControls({ filter, onFilterChange }) {
            const filters = ['all', 'active', 'completed'];
            return React.createElement('div', { className: 'task-controls' },
                filters.map(f =>
                    React.createElement('button', {
                        key: f,
                        className: `filter-btn ${filter === f ? 'active' : ''}`,
                        onClick: () => onFilterChange(f)
                    },
                    f.charAt(0).toUpperCase() + f.slice(1)
                )
            )
            );
        }

        // ============================================
        // Component: TaskItem
        // ============================================

        function TaskItem({ task, onToggle, onDelete, onEdit, onPriorityChange }) {
            const [isEditing, setIsEditing] = useState(false);
            const [editText, setEditText] = useState(task.text);
            const editRef = useRef(null);

            useEffect(() => {
                if (isEditing && editRef.current) {
                    editRef.current.focus();
                    editRef.current.select();
                }
            }, [isEditing]);

            const handleEditStart = () => {
                setIsEditing(true);
                setEditText(task.text);
            };

            const handleEditSave = () => {
                if (editText.trim()) {
                    onEdit(task.id, editText.trim());
                }
                setIsEditing(false);
            };

            const handleEditCancel = () => {
                setEditText(task.text);
                setIsEditing(false);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleEditSave();
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    handleEditCancel();
                }
            };

            return React.createElement('li', {
                className: task.completed ? 'completed' : '',
                'data-id': task.id,
                tabIndex: 0
            },
                React.createElement('div', { className: 'task-item-content' },
                    React.createElement('div', {
                        className: 'task-priority',
                        style: { backgroundColor: PriorityColors[task.priority] }
                    }),
                    React.createElement('input', {
                        type: 'checkbox',
                        className: 'task-checkbox',
                        checked: task.completed,
                        onChange: () => onToggle(task.id),
                        'aria-label': `Mark ${task.text} as ${task.completed ? 'incomplete' : 'complete'}`
                    }),
                    isEditing
                        ? React.createElement('input', {
                            ref: editRef,
                            type: 'text',
                            value: editText,
                            onChange: (e) => setEditText(e.target.value),
                            onBlur: handleEditSave,
                            onKeyDown: handleKeyDown,
                            className: 'task-edit-input',
                            style: {
                                outline: '2px solid #007AFF',
                                background: 'white',
                                padding: '0.25rem 0.5rem',
                                borderRadius: '4px',
                                border: '2px solid #007AFF',
                                fontSize: '0.875rem'
                            }
                        })
                        : React.createElement('span', {
                            className: `task-item-text ${task.completed ? 'completed' : ''}`,
                            onDoubleClick: handleEditStart
                        }, task.text)
                ),
                React.createElement('div', { className: 'task-actions' },
                    !isEditing && React.createElement('select', {
                        className: 'priority-select',
                        value: task.priority,
                        onChange: (e) => onPriorityChange(task.id, e.target.value)
                    },
                        React.createElement('option', { value: Priority.Low }, 'Low'),
                        React.createElement('option', { value: Priority.Normal }, 'Normal'),
                        React.createElement('option', { value: Priority.High }, 'High')
                    ),
                    !isEditing && React.createElement('button', {
                        className: 'edit-btn',
                        onClick: handleEditStart,
                        title: 'Edit'
                    }, '✏️'),
                    React.createElement('button', {
                        className: 'delete-btn',
                        onClick: () => onDelete(task.id),
                        title: 'Delete'
                    }, '🗑️')
                )
            );
        }

        // ============================================
        // Component: TaskList
        // ============================================

        function TaskList({ tasks, onToggle, onDelete, onEdit, onPriorityChange, filter }) {
            let filteredTasks = tasks;
            switch (filter) {
                case 'active':
                    filteredTasks = tasks.filter(t => !t.completed);
                    break;
                case 'completed':
                    filteredTasks = tasks.filter(t => t.completed);
                    break;
                default:
                    filteredTasks = tasks;
            }

            const emptyMessages = {
                all: 'No tasks yet. Add one above!',
                active: 'No active tasks. Great job!',
                completed: 'No completed tasks yet.'
            };

            if (filteredTasks.length === 0) {
                return React.createElement('ul', null,
                    React.createElement('li', { className: 'empty' },
                        tasks.length === 0 ? emptyMessages.all :
                        tasks.filter(t => !t.completed).length === 0 && tasks.filter(t => t.completed).length > 0
                            ? emptyMessages.active
                            : emptyMessages.completed
                    )
                );
            }

            return React.createElement('ul', null,
                filteredTasks.map(task =>
                    React.createElement(TaskItem, {
                        key: task.id,
                        task: task,
                        onToggle: onToggle,
                        onDelete: onDelete,
                        onEdit: onEdit,
                        onPriorityChange: onPriorityChange
                    })
                )
            );
        }

        // ============================================
        // Component: TaskStats
        // ============================================

        function TaskStats({ statistics }) {
            return React.createElement('div', { className: 'task-stats' },
                React.createElement('span', { className: 'stat-item' }, `${statistics.active} active`),
                React.createElement('span', { className: 'stat-item' }, `${statistics.completed} completed`),
                React.createElement('span', { className: 'stat-item' }, `${statistics.percentage}% done`)
            );
        }

        // ============================================
        // Component: Footer
        // ============================================

        function Footer() {
            return React.createElement('footer', null,
                React.createElement('p', null, 'Next: Tailwind → Next.js → Node.js → Prisma')
            );
        }

        // ============================================
        // Main App Component
        // ============================================

        function App() {
            const [tasks, setTasks] = useLocalStorage(STORAGE_KEY, []);
            const [filter, setFilter] = useState('all');

            const addTask = useCallback((text, priority = Priority.Normal) => {
                const newTask = {
                    id: Date.now(),
                    text: text.trim(),
                    completed: false,
                    priority: priority,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                setTasks(prev => [newTask, ...prev]);
            }, [setTasks]);

            const deleteTask = useCallback((id) => {
                setTasks(prev => prev.filter(task => task.id !== id));
            }, [setTasks]);

            const toggleTask = useCallback((id) => {
                setTasks(prev => prev.map(task =>
                    task.id === id
                        ? { ...task, completed: !task.completed, updatedAt: new Date().toISOString() }
                        : task
                ));
            }, [setTasks]);

            const editTask = useCallback((id, newText) => {
                setTasks(prev => prev.map(task =>
                    task.id === id && newText.trim()
                        ? { ...task, text: newText.trim(), updatedAt: new Date().toISOString() }
                        : task
                ));
            }, [setTasks]);

            const setTaskPriority = useCallback((id, priority) => {
                setTasks(prev => prev.map(task =>
                    task.id === id
                        ? { ...task, priority, updatedAt: new Date().toISOString() }
                        : task
                ));
            }, [setTasks]);

            const statistics = useMemo(() => {
                const total = tasks.length;
                const completed = tasks.filter(t => t.completed).length;
                const active = total - completed;
                const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;
                return { total, completed, active, percentage };
            }, [tasks]);

            const handleClearCompleted = useCallback(() => {
                const completedCount = tasks.filter(t => t.completed).length;
                if (completedCount > 0) {
                    setTasks(prev => prev.filter(task => !task.completed));
                    alert(`Cleared ${completedCount} completed tasks`);
                }
            }, [tasks]);

            return React.createElement('div', { className: 'container' },
                React.createElement(Header),
                React.createElement(TaskForm, { onAdd: addTask }),
                React.createElement('section', { 'aria-label': 'Task list' },
                    React.createElement(FilterControls, { filter: filter, onFilterChange: setFilter }),
                    React.createElement(TaskList, {
                        tasks: tasks,
                        onToggle: toggleTask,
                        onDelete: deleteTask,
                        onEdit: editTask,
                        onPriorityChange: setTaskPriority,
                        filter: filter
                    }),
                    React.createElement(TaskStats, { statistics: statistics })
                ),
                React.createElement(Footer)
            );
        }

        // ============================================
        // Render App
        // ============================================

        try {
            const rootElement = document.getElementById('root');
            if (!rootElement) {
                throw new Error('Root element not found');
            }
            const root = createRoot(rootElement);
            root.render(React.createElement(App));
            console.log('React app mounted successfully');
        } catch (error) {
            console.error('Failed to mount React app:', error);
            document.getElementById('root').innerHTML = `
                <div style="padding: 2rem; text-align: center; color: red;">
                    <h2>Error loading React app</h2>
                    <p>${error.message}</p>
                    <p>Check browser console for details</p>
                </div>
            `;
        }
    </script>

    <style>
        /* React-specific styles */
        .task-edit-input {
            font-family: inherit;
            width: 100%;
            border: 2px solid #007AFF;
            border-radius: 4px;
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
        }

        .task-item-text:hover {
            cursor: pointer;
            opacity: 0.8;
        }
    </style>
</body>
</html>
