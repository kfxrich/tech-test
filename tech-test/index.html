<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple, elegant task manager built with HTML and CSS">
    <title>Task Manager - Test 2: CSS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Task Manager</h1>
            <p>Test 2: CSS - Responsive, polished styling</p>
        </header>

        <section aria-label="Add new task">
            <form id="taskForm">
                <div class="input-group">
                    <input
                        type="text"
                        id="taskInput"
                        name="task"
                        placeholder="What needs to be done?"
                        required
                        autocomplete="off"
                        aria-label="New task description"
                    >
                    <button type="submit">Add Task</button>
                </div>
            </form>
        </section>

        <section aria-label="Task list">
            <ul id="taskList">
                <li class="empty">No tasks yet. Add one above!</li>
            </ul>
        </section>

        <footer>
            <p>Next: JavaScript interactivity → TypeScript → React</p>
        </footer>
    </div>

    <script>
        const taskForm = document.getElementById('taskForm');
        const taskInput = document.getElementById('taskInput');
        const taskList = document.getElementById('taskList');
        let tasks = [];

        taskForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const text = taskInput.value.trim();
            if (!text) return;

            const task = {
                id: Date.now(),
                text: text,
                completed: false
            };

            tasks.push(task);
            taskInput.value = '';
            render();
        });

        function render() {
            if (tasks.length === 0) {
                taskList.innerHTML = '<li class="empty">No tasks yet. Add one above!</li>';
                return;
            }

            taskList.innerHTML = tasks.map(task => `
                <li>
                    <span class="task-item-text">${escapeHtml(task.text)}</span>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">Delete</button>
                </li>
            `).join('');
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            render();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
